# SPDX-License-Identifier: Apache-2.0
# Common Error #9: URLs should end in "/"
# Machine-enforceable rules for patterns documented in docs/COMMON_ERRORS.md.

id: bmcweb.common-errors.route-missing-trailing-slash
language: cpp
severity: error
message: >
    BMCWEB_ROUTE URLs should usually end in '/'. Use trailing slash routes
    unless there is a documented exception per docs/COMMON_ERRORS.md.
rule:
    pattern: BMCWEB_ROUTE($APP, $ROUTE)
constraints:
    ROUTE:
        # Match route strings that start with "/" but do not end with "/".
        # Exclude <path> captures which should not have a trailing slash.
        regex: ^"\/.*[^\/]"$
        not:
            regex: "<path>"
